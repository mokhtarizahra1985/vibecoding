<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حدس بزن — کدام کشور؟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --correct: #22c55e;
      --wrong: #ef4444;
      --btn: #243044;
      --btn-hover: #2d3d56;
      --radius: 14px;
      --transition: 0.35s ease;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Vazirmatn", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.25rem;
      line-height: 1.5;
    }

    .app {
      width: 100%;
      max-width: 480px;
    }

    header.stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--muted);
    }

    header.stats strong {
      color: var(--text);
      font-weight: 700;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
    }

    .flag-wrap {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: var(--radius);
      overflow: hidden;
      background: #0a0e12;
      margin-bottom: 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .flag-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .prompt {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 1rem;
      color: var(--muted);
    }

    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .answers button {
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.9rem 0.65rem;
      border: none;
      border-radius: 10px;
      background: var(--btn);
      color: var(--text);
      cursor: pointer;
      transition: background var(--transition), color var(--transition), transform 0.15s ease;
      min-height: 3.25rem;
    }

    .answers button:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .answers button:disabled {
      cursor: default;
      opacity: 0.95;
    }

    .answers button.correct {
      background: var(--correct);
      color: #052e16;
    }

    .answers button.wrong {
      background: var(--wrong);
      color: #450a0a;
    }

    .loading,
    .error {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
    }

    .error {
      color: #fca5a5;
    }

    .hidden {
      display: none !important;
    }

    /* Result screen */
    .result {
      text-align: center;
      padding: 0.5rem 0 1rem;
    }

    .result .score-big {
      font-size: 3rem;
      font-weight: 700;
      color: var(--accent);
      margin: 0.5rem 0;
    }

    .result p {
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .btn-primary {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.85rem 2rem;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: filter var(--transition), transform 0.15s ease;
      width: 100%;
      max-width: 280px;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="stats hidden" id="statsBar">
      <span>امتیاز: <strong id="scoreEl">0</strong></span>
      <span id="roundEl">سوال ۱ از ۱۰</span>
    </header>

    <div class="card" id="gameCard">
      <div id="loadingView" class="loading">در حال بارگذاری کشورها…</div>
      <div id="errorView" class="error hidden"></div>

      <div id="playView" class="hidden">
        <h1>پرچم مال کدوم کشوره؟</h1>
        <div class="flag-wrap">
          <img id="flagImg" src="" alt="پرچم کشور" />
        </div>
        <p class="prompt">یکی از گزینه‌ها رو انتخاب کن</p>
        <div class="answers" id="answersGrid"></div>
      </div>

      <div id="resultView" class="result hidden">
        <h1>پایان بازی!</h1>
        <p>امتیاز نهایی شما</p>
        <div class="score-big" id="finalScore">0</div>
        <p id="finalMessage"></p>
        <button type="button" class="btn-primary" id="playAgainBtn">بازی دوباره</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL =
      "https://restcountries.com/v3.1/all?fields=name,flags,capital,region,population";
    const TOTAL_ROUNDS = 10;
    const FEEDBACK_MS = 1000;

    let countries = [];
    let score = 0;
    let currentRound = 0;
    let currentCountry = null;
    let answered = false;

    const loadingView = document.getElementById("loadingView");
    const errorView = document.getElementById("errorView");
    const playView = document.getElementById("playView");
    const resultView = document.getElementById("resultView");
    const statsBar = document.getElementById("statsBar");
    const scoreEl = document.getElementById("scoreEl");
    const roundEl = document.getElementById("roundEl");
    const flagImg = document.getElementById("flagImg");
    const answersGrid = document.getElementById("answersGrid");
    const finalScore = document.getElementById("finalScore");
    const finalMessage = document.getElementById("finalMessage");
    const playAgainBtn = document.getElementById("playAgainBtn");

    function countryName(c) {
      return c.name.common;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickRandomCountry(exclude) {
      const pool = exclude
        ? countries.filter((c) => c !== exclude)
        : countries;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function buildOptions(correct) {
      const names = new Set([countryName(correct)]);
      const options = [correct];
      while (options.length < 4) {
        const other = pickRandomCountry(correct);
        const n = countryName(other);
        if (!names.has(n)) {
          names.add(n);
          options.push(other);
        }
      }
      return shuffle(options);
    }

    function updateStats() {
      scoreEl.textContent = String(score);
      roundEl.textContent = `سوال ${currentRound} از ${TOTAL_ROUNDS}`;
    }

    function showError(msg) {
      loadingView.classList.add("hidden");
      playView.classList.add("hidden");
      resultView.classList.add("hidden");
      statsBar.classList.add("hidden");
      errorView.textContent = msg;
      errorView.classList.remove("hidden");
    }

    function startGame() {
      score = 0;
      currentRound = 0;
      answered = false;
      resultView.classList.add("hidden");
      playView.classList.remove("hidden");
      statsBar.classList.remove("hidden");
      updateStats();
      nextRound();
    }

    function nextRound() {
      if (currentRound >= TOTAL_ROUNDS) {
        showResults();
        return;
      }
      currentRound += 1;
      answered = false;
      currentCountry = pickRandomCountry();
      const options = buildOptions(currentCountry);

      const flagUrl =
        currentCountry.flags?.svg || currentCountry.flags?.png || "";
      flagImg.src = flagUrl;
      flagImg.alt = "پرچم";

      answersGrid.innerHTML = "";
      options.forEach((c) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = countryName(c);
        btn.dataset.name = countryName(c);
        btn.addEventListener("click", () => onAnswer(btn, c));
        answersGrid.appendChild(btn);
      });

      updateStats();
    }

    function onAnswer(btn, chosen) {
      if (answered) return;
      answered = true;

      const correctName = countryName(currentCountry);
      const chosenName = countryName(chosen);
      const buttons = [...answersGrid.querySelectorAll("button")];

      buttons.forEach((b) => {
        b.disabled = true;
        if (b.dataset.name === correctName) {
          b.classList.add("correct");
        }
      });

      if (chosenName === correctName) {
        btn.classList.add("correct");
        score += 1;
        updateStats();
      } else {
        btn.classList.add("wrong");
      }

      setTimeout(() => {
        if (currentRound >= TOTAL_ROUNDS) {
          showResults();
        } else {
          nextRound();
        }
      }, FEEDBACK_MS);
    }

    function showResults() {
      playView.classList.add("hidden");
      statsBar.classList.add("hidden");
      resultView.classList.remove("hidden");
      finalScore.textContent = String(score);
      const pct = (score / TOTAL_ROUNDS) * 100;
      if (score === TOTAL_ROUNDS) {
        finalMessage.textContent = "عالی! همه رو درست گفتی 🎉";
      } else if (pct >= 70) {
        finalMessage.textContent = "کار خوبی کردی!";
      } else if (pct >= 40) {
        finalMessage.textContent = "می‌تونی دوباره تمرین کنی.";
      } else {
        finalMessage.textContent = "دفعه بعد بهتر می‌شه!";
      }
    }

    async function loadCountries() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        countries = data.filter(
          (c) => c.flags?.png || c.flags?.svg
        );
        if (countries.length < 4) {
          throw new Error("داده کافی نیست");
        }
        loadingView.classList.add("hidden");
        startGame();
      } catch (e) {
        showError(
          "خطا در بارگذاری کشورها. اتصال اینترنت را بررسی کنید و صفحه را رفرش کنید."
        );
        console.error(e);
      }
    }

    playAgainBtn.addEventListener("click", startGame);
    loadCountries();
  </script>
</body>
</html>
